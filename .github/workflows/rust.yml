name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.92.0
      with:
        components: rustfmt, clippy
      
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

  sdk-features:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature-set: [core, protocol, host, embed, testing]
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.92.0

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check unigateway-sdk feature set
      run: cargo check -p unigateway-sdk --no-default-features --features ${{ matrix.feature-set }}

    - name: Test unigateway-sdk feature set
      run: cargo test -p unigateway-sdk --no-default-features --features ${{ matrix.feature-set }}

  host-testing:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.92.0

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Test unigateway-host testing feature
      run: cargo test -p unigateway-host --features testing
