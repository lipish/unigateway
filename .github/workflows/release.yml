name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ug

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: ug-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: ug-x86_64-apple-darwin.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: ug-x86_64-unknown-linux-gnu.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ env.BIN_NAME }}
          cd ../../..
          shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM=$(awk '{print $1}' dist/ug-aarch64-apple-darwin.tar.gz.sha256)
          SHA_X86_MAC=$(awk '{print $1}' dist/ug-x86_64-apple-darwin.tar.gz.sha256)
          SHA_LINUX=$(awk '{print $1}' dist/ug-x86_64-unknown-linux-gnu.tar.gz.sha256)

          cp Formula/ug.rb /tmp/ug.rb
          sed -i "s/version \".*\"/version \"${VERSION}\"/" /tmp/ug.rb
          sed -i "0,/PLACEHOLDER/{s/PLACEHOLDER/${SHA_ARM}/}"   /tmp/ug.rb
          sed -i "0,/PLACEHOLDER/{s/PLACEHOLDER/${SHA_X86_MAC}/}" /tmp/ug.rb
          sed -i "0,/PLACEHOLDER/{s/PLACEHOLDER/${SHA_LINUX}/}"  /tmp/ug.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/EeroEternal/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp /tmp/ug.rb tap/Formula/ug.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ug.rb
          git diff --cached --quiet || { git commit -m "ug ${VERSION}" && git push; }
