[package]
name = "unigateway"
version = "0.1.0"
edition = "2021"
description = "Lightweight OSS LLM gateway with OpenAI and Anthropic compatibility"
license = "MIT"
repository = "https://github.com/lipish/unigateway"
readme = "README.md"
keywords = ["llm", "openai", "anthropic", "gateway", "proxy"]
categories = ["web-programming::http-server", "api-bindings"]
authors = ["lipi <lipicoder@qq.com>"]

[lib]
name = "unigateway"
path = "src/lib.rs"

[[bin]]
name = "unigateway"
path = "src/bin/unigateway.rs"

[dependencies]
anyhow = "1"
axum = { version = "0.7", features = ["macros"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "macros"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
url = "2"
llm-connector = "0.6.1"
llm_providers = "0.2"
