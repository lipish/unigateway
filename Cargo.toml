[package]
name = "unigateway"
version = "0.9.10"
edition = "2024"
rust-version = "1.92"
description = "Lightweight, local-first LLM gateway for developers. A stable, single-binary unified entry point for all your AI tools and models."
license = "MIT"
repository = "https://github.com/EeroEternal/unigateway"
readme = "README.md"
keywords = ["llm", "gateway", "openai", "anthropic", "proxy"]
categories = ["web-programming::http-server", "api-bindings", "command-line-utilities"]
authors = ["EeroEternal <songmqq@proton.me>"]

[[bin]]
name = "ug"
path = "src/main.rs"

[dependencies]
anyhow = "1"
axum = { version = "0.7", features = ["macros"] }
clap = { version = "4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
url = "2"
llm-connector = { version = "1.1.8", features = ["streaming"] }
llm_providers = "0.8.1"
futures-util = "0.3"
bytes = "1"
dirs = "6.0.0"
dialoguer = "0.12.0"
tempfile = "3.27.0"
libc = "0.2.183"
rmcp = { version = "1", features = ["server", "transport-io", "macros"] }
schemars = "1"
clap_complete = "4.6.0"
console = "0.16.3"
indicatif = "0.18.4"
